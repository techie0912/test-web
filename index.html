<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Pose Ideas</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

header{
    text-align:center;
    padding:30px;
    background:#0ea5e9;
    color:white;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:10px;
}

.card img{
    width:100%;
    height:400px;
    object-fit:cover;
    transition:0.4s;
}

.card:hover img{
    transform:scale(1.1);
}

.caption{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    text-align:center;
    padding:10px;
    font-size:18px;
}
</style>

</head>

<body>

<header>
<h1>🌊 Beach Pose Ideas</h1>
<p>Các kiểu tạo dáng đẹp khi đi biển</p>
</header>

<section class="gallery">

<div class="card">
<img src="https://kenh14cdn.com/2019/5/7/1976189311208808346801341559366603563335680n-1557246827274866500663.jpg">
<div class="caption">Cười thật tươi</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<div class="caption">Chèo thuyền</div>
</div>

<div class="card">
<img src="https://kenh14cdn.com/2019/5/7/54247972579767049169089974939951027380537n-15572461783451779945002.jpg">
<div class="caption">Đi dọc bờ biển</div>
</div>

<div class="card">
<img src="https://kenh14cdn.com/2019/5/7/497463945543809683634156834377367550974584n-15572446056811064478829.jpg">
<div class="caption">Lấy tay vén tóc</div>
</div>

<div class="card">
<img src="https://kenh14cdn.com/2019/5/7/442477755025675469110738465815132982901653n-15572451212521764304476.jpg">
<div class="caption">Hoàng hôn trên biển</div>
</div>

<div class="card">
<img src="https://kenh14cdn.com/2019/5/7/mhgng-1494303860291-1557243617133177014702.jpg">
<div class="caption">Bambi Pose</div>
</div>

<div class="card">
<img src="https://kenh14cdn.com/2019/5/7/5640561220119637024431042575795244683420861n-1557241824442489151894.jpg">
<div class="caption">Hướng mặt ra biển</div>
</div>

<div class="card">
<img src="https://kenh14cdn.com/thumb_w/660/2019/5/7/4259144619583255809226438810033058994903157n-155724502503774989360.jpg">
<div class="caption">Lạc trôi giữa biển</div>
</div>

</section>

</body>
</html>
